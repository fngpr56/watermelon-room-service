<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Dashboard</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card page-panel page-layout">
        <div>
          <span class="eyebrow">Staff Area</span>
          <h2 id="page-title">Staff dashboard</h2>
          <p class="muted">This is the post-login landing page for authenticated staff.</p>
        </div>

        <div class="meta" id="meta"></div>

        <section class="grid">
          <article class="tile">
            <strong>Open requests</strong>
            <p>Next step: connect staff tooling to live guest requests and inventory.</p>
          </article>
          <article class="tile">
            <strong>Role-aware access</strong>
            <p>This page only loads after a valid staff session cookie is verified.</p>
          </article>
        </section>

        <div class="button-row">
          <button class="secondary" id="logout-button" type="button">Log out</button>
        </div>
        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="/staff-main.js"></script>
  </body>
</html>
