<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receptionist Chats</title>
    <link rel="stylesheet" href="/receptionist-theme.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">Hotel Kavun</div>
        <nav class="nav">
          <a href="/receptionist-tasks.html">Tasks</a>
          <a href="/receptionist-chats.html">Chats</a>
          <a href="/receptionist-inventory.html">Inventory</a>
          <a href="/receptionist-rooms.html">Rooms</a>
          <a href="#">Settings</a>
        </nav>
      </header>

      <section class="layout">
        <aside class="sidebar">
          <div class="sidebar-tools">
            <label class="search">
              <input type="text" placeholder="Search..." />
              <span>⌕</span>
            </label>
          </div>

          <div class="side-list">
            <button class="side-item">
              <p class="side-item-title">Room B 172</p>
            </button>
            <button class="side-item">
              <p class="side-item-title">Runner Kozlov</p>
            </button>
          </div>
        </aside>

        <section class="main chat-page">
          <div class="chat-compose">
            <div class="chat-input-row">
              <input class="chat-input" type="text" />
              <button class="send-button">➤</button>
            </div>
          </div>
        </section>
      </section>
    </main>
  </body>
</html>
