<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guest Tasks</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/guest-tasks.css" />
  </head>
  <body>
    <main class="tasks-screen">
      <section class="tasks-shell">
        <header class="tasks-header">
          <div class="tasks-heading">
            <p class="tasks-eyebrow">Guest Tasks</p>
            <h1 id="page-title">Room 172</h1>
            <p class="tasks-copy">View your room requests in a single read-only table.</p>
          </div>

          <div class="tasks-header-actions">
            <button id="back-home-button" class="pill-button" type="button">Home</button>
            <button id="open-help-button" class="pill-button" type="button">Help</button>
            <button id="logout-button" class="pill-button" type="button">Log out</button>
          </div>
        </header>
        <div id="meta" class="sr-only" aria-hidden="true"></div>

        <section class="tasks-panel">
          <div class="tasks-panel-header">
            <div>
              <h2>My requests</h2>
              <p>Review the current request history for your room.</p>
            </div>
            <span id="request-count" class="count-pill">0 requests</span>
          </div>

          <div class="tasks-table-wrap">
            <table class="tasks-table">
              <thead>
                <tr>
                  <th>Requested</th>
                  <th>Category</th>
                  <th>Status</th>
                  <th>ETA</th>
                  <th>Notes</th>
                </tr>
              </thead>
              <tbody id="request-table-body"></tbody>
            </table>
          </div>
        </section>

        <p id="status" class="sr-only" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="/guest-tasks.js"></script>
  </body>
</html>
