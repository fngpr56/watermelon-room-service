<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guest Tasks</title>
    <link rel="stylesheet" href="/guest-tasks.css" />
  </head>
  <body>
    <main class="tasks-screen">
      <section class="tasks-shell">
        <header class="tasks-header">
          <h1 id="page-title">Room B 172</h1>
          <button id="back-home-button" class="icon-close" type="button" aria-label="Back home" onclick="window.location.href='/guest'">×</button>
        </header>
        <div id="meta" hidden></div>
        <section class="tasks-layout">
          <div class="task-overlay" id="task-overlay" hidden>
  <div class="task-overlay-card">
    <button id="close-overlay-button" class="icon-close overlay-close" type="button" aria-label="Close">×</button>

    <div class="task-detail task-detail-overlay">
      <div class="task-detail-head">
        <h2 id="mobile-detail-title">Select a request</h2>
      </div>

      <div class="task-detail-meta">
        <span class="status-pill" id="mobile-detail-status">—</span>
        <span class="detail-eta" id="mobile-detail-eta">—</span>
      </div>

      <div class="task-detail-body">
        <p id="mobile-detail-notes">Choose a request.</p>
      </div>

      <div class="task-chat">
        <div class="task-input-row">
          <input id="mobile-message-input" type="text" placeholder="" />
          <button id="mobile-send-button" class="send-button" type="button" aria-label="Send">➤</button>
        </div>
      </div>
    </div>
  </div>
</div>
          <aside class="tasks-sidebar">
            <div class="tasks-list" id="request-list"></div>
          </aside>

          <section class="task-detail">
            <div class="task-detail-head">
              <h2 id="detail-title">Select a request</h2>
            </div>

            <div class="task-detail-meta">
              <span class="status-pill" id="detail-status">—</span>
              <span class="detail-eta" id="detail-eta">—</span>
            </div>

            <div class="task-detail-body">
              <p id="detail-notes">Choose a request on the left to view full details.</p>
            </div>

            <div class="task-chat">

              <div class="task-input-row">
                <input id="message-input" type="text" placeholder="Type a message…" />
                <button id="send-button" class="send-button" type="button" aria-label="Send">➤</button>
              </div>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script type="module" src="/guest-tasks.js"></script>
  </body>
</html>
