<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guest Tasks</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card page-panel page-layout">
        <div>
          <span class="eyebrow">Guest Tasks</span>
          <h2 id="page-title">Guest Tasks</h2>
          <p class="muted">View your room requests in a single read-only table.</p>
        </div>

        <div class="meta" id="meta"></div>

        <div class="button-row page-nav">
          <button class="secondary" id="back-home-button" type="button">Back home</button>
          <button class="secondary" id="open-help-button" type="button">Help</button>
          <button class="secondary" id="logout-button" type="button">Log out</button>
        </div>

        <section>
          <article class="tile manager-panel">
            <div class="section-heading section-heading-row">
              <div>
                <strong>My requests</strong>
                <p class="muted">Review the current request history for your room.</p>
              </div>
              <span id="request-count" class="table-count">0 requests</span>
            </div>

            <div class="table-wrap">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>Requested</th>
                    <th>Category</th>
                    <th>Status</th>
                    <th>ETA</th>
                    <th>Notes</th>
                  </tr>
                </thead>
                <tbody id="request-table-body"></tbody>
              </table>
            </div>
          </article>
        </section>

        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="/guest-tasks.js"></script>
  </body>
</html>
