<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watermelon Room Service Login</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell login-shell">
      <section class="login-stage" aria-labelledby="login-title">
        <h1 id="login-title" class="login-title">Hotel Kavun</h1>

        <div class="login-card">
          <form id="login-form" class="login-form">
            <label class="sr-only" for="identifier">Identifier</label>
            <input
              id="identifier"
              name="identifier"
              type="text"
              autocomplete="username"
              placeholder="Room number or email"
              required
            />

            <label class="sr-only" for="password">Password</label>
            <div class="password-field-row">
              <input
                id="password"
                name="password"
                type="password"
                autocomplete="current-password"
                placeholder="Password"
                required
              />
              <button class="secondary password-toggle" type="button" id="toggle-password-button" aria-label="Show password">
                Show
              </button>
            </div>

            <div class="button-row login-button-row">
              <button class="primary login-button" type="submit" id="submit-button">LOGIN</button>
            </div>
            <p id="status" class="status login-status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <script type="module" src="/login.js"></script>
  </body>
</html>
