<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guest Home</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/guest-main.css" />
  </head>
  <body>
    <main class="guest-home-screen">
      <section class="guest-home">
        <div class="guest-toolbar">
          <div id="meta" class="sr-only" aria-hidden="true"></div>
          <button id="logout-button" type="button">Log out</button>
        </div>

        <div class="guest-center">
          <h1 id="page-title" class="room-title">172</h1>

          <button
            class="microphone-button"
            id="microphone-button"
            type="button"
            aria-label="Open help conversation"
            aria-pressed="false"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
              <path
                d="M12 15.5a3.5 3.5 0 0 0 3.5-3.5V7a3.5 3.5 0 1 0-7 0v5a3.5 3.5 0 0 0 3.5 3.5Zm6.25-3.75a.75.75 0 0 0-1.5 0 4.75 4.75 0 1 1-9.5 0 .75.75 0 0 0-1.5 0 6.26 6.26 0 0 0 5.5 6.21V21a.75.75 0 0 0 1.5 0v-3.04a6.26 6.26 0 0 0 5.5-6.21Z"
                fill="currentColor"
              ></path>
            </svg>
          </button>

          <form class="guest-message-form" id="guest-message-form">
            <div class="guest-message-row">
              <input
                class="guest-message-input"
                id="guest-message-input"
                type="text"
                placeholder="Type here"
                autocomplete="off"
              />
              <button class="guest-message-submit" id="guest-message-submit" type="submit">Submit</button>
            </div>

            <div class="guest-message-controls">
              <select class="guest-message-select" id="guest-item-select" aria-label="Select item">
                <option value="">Auto-detect item</option>
              </select>

              <select class="guest-message-select guest-quantity-select" id="guest-quantity-select" aria-label="Select quantity">
                <option value="">Auto quantity</option>
              </select>
            </div>

            <p class="guest-form-status" id="guest-form-status" aria-live="polite"></p>
          </form>

          <div class="home-actions">
            <button class="secondary action-pill" id="tasks-button" type="button">Tasks</button>
            <button class="secondary action-pill" id="help-button" type="button">Help</button>
          </div>
        </div>

        <p id="status" class="sr-only" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="/guest-main.js"></script>
    <!-- Botpress -->

    <script type="module" src="/botpress.js"></script>
    <script type="module" src="/stt.js"></script>
  </body>
</html>
